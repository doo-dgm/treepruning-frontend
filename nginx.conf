server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    # Raíz de los archivos estáticos generados por `vite build`
    root   /usr/share/nginx/html;
    index  index.html;

    # Compresión básica
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # SPA fallback -- Vue Router en modo history
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache largo para assets versionados por Vite (con hash en el nombre)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cachear el HTML
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
